<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" fill="none">
  <!-- Roman inscription style: Trajan-esque capitals, with subtle chisel shadow -->
  <defs>
    <linearGradient id="chisel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="currentColor" stop-opacity="1"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.75"/>
    </linearGradient>
  </defs>
  <!-- Top & bottom serif rules (carved lines) -->
  <g stroke="#0891b2" stroke-width="1" opacity="0.6">
    <line x1="12" y1="12" x2="248" y2="12"/>
    <line x1="12" y1="56" x2="248" y2="56"/>
  </g>
  <!-- Wordmark -->
  <text x="130" y="44" text-anchor="middle"
        font-family="'Trajan Pro', 'Cinzel', 'Cormorant Garamond', Georgia, serif"
        font-size="28" font-weight="700" letter-spacing="8"
        fill="url(#chisel)">ARCHIFEX</text>
  <!-- Latin tagline with interpunct separators -->
  <text x="130" y="68" text-anchor="middle"
        font-family="'Cinzel', Georgia, serif" font-size="7" letter-spacing="4"
        fill="#0891b2" opacity="0.75">QVI · AEDIFICAT · WEB</text>
</svg>
