<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- A built from a 7x8 pixel grid -->
  <g fill="#0891b2">
    <!-- Row 1 -->
    <rect x="24" y="6" width="8" height="8"/>
    <!-- Row 2 -->
    <rect x="16" y="14" width="8" height="8"/>
    <rect x="32" y="14" width="8" height="8"/>
    <!-- Row 3 -->
    <rect x="16" y="22" width="8" height="8"/>
    <rect x="32" y="22" width="8" height="8"/>
    <!-- Row 4 (crossbar) -->
    <rect x="8" y="30" width="8" height="8"/>
    <rect x="16" y="30" width="8" height="8"/>
    <rect x="24" y="30" width="8" height="8"/>
    <rect x="32" y="30" width="8" height="8"/>
    <rect x="40" y="30" width="8" height="8"/>
    <!-- Row 5 -->
    <rect x="8" y="38" width="8" height="8"/>
    <rect x="40" y="38" width="8" height="8"/>
    <!-- Row 6 -->
    <rect x="8" y="46" width="8" height="8"/>
    <rect x="40" y="46" width="8" height="8"/>
    <!-- Row 7 -->
    <rect x="0" y="54" width="8" height="8"/>
    <rect x="48" y="54" width="8" height="8"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="42" font-family="ui-monospace, monospace" font-size="24" font-weight="700" letter-spacing="1" fill="currentColor">ARCHIFEX</text>
</svg>
