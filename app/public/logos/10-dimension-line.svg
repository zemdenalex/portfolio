<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <!-- Lowercase mono wordmark with architectural dimension line underneath -->
  <text x="6" y="28" font-family="ui-monospace, Menlo, monospace" font-size="26" font-weight="700" letter-spacing="-0.5" fill="currentColor">archifex</text>
  <!-- Dimension line with arrow ticks -->
  <g stroke="#0891b2" stroke-width="1.25">
    <line x1="8" y1="40" x2="158" y2="40"/>
    <!-- Left tick (arrow cap) -->
    <line x1="8" y1="36" x2="8" y2="44"/>
    <line x1="8" y1="40" x2="14" y2="36"/>
    <line x1="8" y1="40" x2="14" y2="44"/>
    <!-- Right tick (arrow cap) -->
    <line x1="158" y1="36" x2="158" y2="44"/>
    <line x1="158" y1="40" x2="152" y2="36"/>
    <line x1="158" y1="40" x2="152" y2="44"/>
  </g>
  <!-- Dimension label centered above line (below text) -->
  <text x="83" y="54" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" letter-spacing="3" fill="#0891b2">BLUEPRINT → BUILD</text>
</svg>
