<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <!-- Architectural drawing layout: icon + wordmark + dimension + height -->
  <g transform="translate(12 16)">
    <!-- [A] bracket icon, properly baseline-aligned -->
    <g stroke="#0891b2" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M6 4 L2 4 L2 36 L6 36"/>
      <path d="M30 4 L34 4 L34 36 L30 36"/>
    </g>
    <text x="18" y="27" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="currentColor">A</text>
    <!-- Wordmark aligned to same baseline as A -->
    <text x="48" y="27" font-family="ui-monospace, Menlo, monospace" font-size="22" font-weight="700" letter-spacing="-0.3" fill="currentColor">archifex</text>
  </g>
  <!-- Horizontal dimension line EXACTLY under wordmark -->
  <g stroke="#0891b2" stroke-width="1.2">
    <line x1="60" y1="52" x2="208" y2="52"/>
    <!-- Left cap -->
    <line x1="60" y1="48" x2="60" y2="56"/>
    <line x1="60" y1="52" x2="67" y2="49"/>
    <line x1="60" y1="52" x2="67" y2="55"/>
    <!-- Right cap -->
    <line x1="208" y1="48" x2="208" y2="56"/>
    <line x1="208" y1="52" x2="201" y2="49"/>
    <line x1="208" y1="52" x2="201" y2="55"/>
  </g>
  <text x="134" y="64" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" letter-spacing="3" fill="#0891b2" opacity="0.85">8 · LETTERS</text>
  <!-- Vertical dimension on right -->
  <g stroke="#0891b2" stroke-width="0.9">
    <line x1="224" y1="20" x2="224" y2="44"/>
    <line x1="220" y1="20" x2="228" y2="20"/>
    <line x1="220" y1="44" x2="228" y2="44"/>
  </g>
  <text x="240" y="34" font-family="ui-monospace, monospace" font-size="7" letter-spacing="2" fill="#0891b2" opacity="0.7">24px</text>
</svg>
