<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 88" fill="none">
  <!-- Exploded isometric A — clean alignment, no middle dashes -->
  <g transform="translate(10 8)">
    <!-- Apex piece -->
    <g transform="translate(0 0)">
      <path d="M30 0 L46 8 L30 16 L14 8 Z" fill="#0891b2"/>
      <path d="M14 8 L30 16 L30 22 L14 14 Z" fill="#0891b2" opacity="0.55"/>
      <path d="M46 8 L30 16 L30 22 L46 14 Z" fill="#0891b2" opacity="0.3"/>
    </g>
    <!-- Crossbar piece (middle) — aligned horizontally with apex centerline -->
    <g transform="translate(-10 30)">
      <path d="M10 6 L20 1 L60 1 L50 6 Z" fill="#0891b2"/>
      <path d="M10 6 L20 1 L20 9 L10 14 Z" fill="#0891b2" opacity="0.55"/>
      <path d="M50 6 L60 1 L60 9 L50 14 Z" fill="#0891b2" opacity="0.3"/>
      <path d="M10 6 L50 6 L50 14 L10 14 Z" fill="#0891b2" opacity="0.2"/>
    </g>
    <!-- Base pieces: two legs aligned to apex edges -->
    <g transform="translate(-12 54)">
      <!-- Left leg -->
      <path d="M4 4 L14 0 L16 24 L6 28 Z" fill="#0891b2"/>
      <path d="M4 4 L6 28 L-2 24 L-4 0 Z" fill="#0891b2" opacity="0.55"/>
      <path d="M4 4 L14 0 L12 -2 L2 2 Z" fill="#0891b2" opacity="0.8"/>
    </g>
    <g transform="translate(46 54)">
      <!-- Right leg -->
      <path d="M0 0 L10 4 L8 28 L-2 24 Z" fill="#0891b2"/>
      <path d="M10 4 L8 28 L16 24 L18 0 Z" fill="#0891b2" opacity="0.3"/>
      <path d="M0 0 L10 4 L20 0 L10 -4 Z" fill="#0891b2" opacity="0.8"/>
    </g>
    <!-- Single subtle vertical guide at center (shows alignment axis, very faint) -->
    <line x1="30" y1="22" x2="30" y2="30" stroke="#0891b2" stroke-width="0.75" opacity="0.4"/>
    <line x1="30" y1="45" x2="30" y2="54" stroke="#0891b2" stroke-width="0.75" opacity="0.4"/>
  </g>
  <!-- Wordmark + tagline -->
  <text x="104" y="44" font-family="system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
  <text x="104" y="58" font-family="ui-monospace, monospace" font-size="8" letter-spacing="3" fill="#0891b2" opacity="0.7">ASSEMBLED · WITH · CARE</text>
</svg>
