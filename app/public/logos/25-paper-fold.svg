<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!-- Origami/folded paper A — visible fold creases -->
  <g transform="translate(4 4)">
    <!-- Main A shape (light base) -->
    <path d="M28 4 L56 60 L0 60 Z" fill="#0891b2" opacity="0.95"/>
    <!-- Fold creases: left face shadow -->
    <path d="M28 4 L28 60 L0 60 Z" fill="#0891b2" opacity="0.55"/>
    <!-- Fold creases: inner triangle (darker from valley fold) -->
    <path d="M28 20 L44 50 L12 50 Z" fill="#0891b2" opacity="0.3"/>
    <!-- Crossbar valley -->
    <path d="M14 40 L42 40 L40 46 L16 46 Z" fill="var(--bg, #0c1929)" opacity="0.75"/>
    <path d="M14 40 L42 40 L40 42 L16 42 Z" fill="currentColor" opacity="0.2"/>
    <!-- Highlight on central fold (mountain fold line) -->
    <line x1="28" y1="4" x2="28" y2="60" stroke="currentColor" stroke-width="0.75" opacity="0.3"/>
    <line x1="28" y1="4" x2="28" y2="18" stroke="#fff" stroke-width="0.5" opacity="0.6"/>
    <!-- Paper edge glint on right -->
    <line x1="28" y1="4" x2="56" y2="60" stroke="#fff" stroke-width="0.5" opacity="0.35"/>
    <!-- Corner fold (small triangle flap bottom-right) -->
    <path d="M52 60 L56 60 L56 56 Z" fill="currentColor" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="78" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
  <text x="78" y="54" font-family="ui-monospace, monospace" font-size="7" letter-spacing="3" fill="#0891b2" opacity="0.7">FOLDED · FROM · PLAN</text>
</svg>
