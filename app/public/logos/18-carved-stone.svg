<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 112" fill="none">
  <!-- Carved stone inscription with meaning explained -->
  <defs>
    <linearGradient id="carved18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="currentColor" stop-opacity="1"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.75"/>
    </linearGradient>
  </defs>
  <!-- Top & bottom rule with corner pins -->
  <g stroke="#0891b2" stroke-width="0.75" opacity="0.5">
    <line x1="30" y1="16" x2="290" y2="16"/>
    <line x1="30" y1="92" x2="290" y2="92"/>
  </g>
  <g fill="#0891b2">
    <circle cx="30" cy="16" r="1.5"/>
    <circle cx="290" cy="16" r="1.5"/>
    <circle cx="30" cy="92" r="1.5"/>
    <circle cx="290" cy="92" r="1.5"/>
  </g>
  <!-- Main inscription -->
  <text x="160" y="52" text-anchor="middle"
        font-family="'Cinzel', 'Trajan Pro', Georgia, serif"
        font-size="32" font-weight="700" letter-spacing="9"
        fill="url(#carved18)">ARCHIFEX</text>
  <!-- Etymology breakdown -->
  <g font-family="'Cinzel', Georgia, serif">
    <text x="160" y="74" text-anchor="middle" font-size="9" letter-spacing="3" fill="#0891b2" opacity="0.95">
      <tspan font-weight="700">ARCHI</tspan><tspan opacity="0.7">·CHIEF  </tspan><tspan fill="currentColor" opacity="0.5">+</tspan><tspan font-weight="700">  FEX</tspan><tspan opacity="0.7">·MAKER</tspan>
    </text>
    <text x="160" y="88" text-anchor="middle" font-size="7" letter-spacing="4" fill="#0891b2" opacity="0.6" font-style="italic">FROM · LATIN · ARTIFEX · PONTIFEX</text>
  </g>
  <!-- Studio line -->
  <text x="160" y="106" text-anchor="middle" font-family="ui-monospace, monospace" font-size="6" letter-spacing="4" fill="currentColor" opacity="0.55">WEB · ARCHITECTURE · STUDIO</text>
</svg>
