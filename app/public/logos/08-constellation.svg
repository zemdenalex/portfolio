<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- A as connected nodes (circuit / constellation) -->
  <g>
    <!-- Connector lines -->
    <g stroke="#0891b2" stroke-width="1.25" opacity="0.7">
      <line x1="28" y1="10" x2="10" y2="56"/>
      <line x1="28" y1="10" x2="46" y2="56"/>
      <line x1="19" y1="33" x2="37" y2="33"/>
      <line x1="10" y1="56" x2="46" y2="56" stroke-dasharray="2 3" opacity="0.4"/>
    </g>
    <!-- Nodes -->
    <g fill="#0891b2">
      <circle cx="28" cy="10" r="4"/>
      <circle cx="10" cy="56" r="3"/>
      <circle cx="46" cy="56" r="3"/>
      <circle cx="19" cy="33" r="2.5"/>
      <circle cx="37" cy="33" r="2.5"/>
    </g>
    <!-- Outer ring on apex for emphasis -->
    <circle cx="28" cy="10" r="7" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="42" font-family="system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
</svg>
