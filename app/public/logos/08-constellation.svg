<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- Truss/joist pattern — structural graph forming A -->
  <g transform="translate(4 4)">
    <!-- Beams (main structure) -->
    <g stroke="currentColor" stroke-width="1.5" opacity="0.9">
      <line x1="10" y1="52" x2="26" y2="4"/>
      <line x1="26" y1="4" x2="42" y2="52"/>
      <line x1="10" y1="52" x2="42" y2="52"/>
    </g>
    <!-- Cross-bracing (truss diagonals) -->
    <g stroke="#0891b2" stroke-width="1" opacity="0.8">
      <line x1="18" y1="28" x2="34" y2="28"/>
      <line x1="14" y1="40" x2="38" y2="40"/>
      <line x1="18" y1="28" x2="26" y2="52"/>
      <line x1="34" y1="28" x2="26" y2="52"/>
      <line x1="14" y1="40" x2="26" y2="4"/>
      <line x1="38" y1="40" x2="26" y2="4"/>
    </g>
    <!-- Joint nodes -->
    <g fill="#0891b2">
      <circle cx="26" cy="4" r="2.75"/>
      <circle cx="10" cy="52" r="2"/>
      <circle cx="42" cy="52" r="2"/>
      <circle cx="18" cy="28" r="1.75"/>
      <circle cx="34" cy="28" r="1.75"/>
      <circle cx="14" cy="40" r="1.5"/>
      <circle cx="38" cy="40" r="1.5"/>
      <circle cx="26" cy="52" r="1.5"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="72" y="42" font-family="system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
</svg>
