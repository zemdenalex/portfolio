<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- Clean geometric A: outer triangle with inner triangular cutout, crossbar -->
  <g>
    <!-- Outer filled triangle -->
    <path d="M28 8 L52 56 L4 56 Z" fill="#0891b2"/>
    <!-- Inner cutout triangle (upper) -->
    <path d="M28 20 L44 50 L12 50 Z" fill="var(--bg, #0c1929)"/>
    <!-- Crossbar slot -->
    <rect x="17" y="38" width="22" height="5" fill="var(--bg, #0c1929)"/>
  </g>
  <!-- Wordmark — clean geometric sans -->
  <text x="68" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="currentColor">Archifex</text>
</svg>
