<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!-- ONE A split vertically into 3 stages: sketch | blueprint | built -->
  <g transform="translate(8 4)">
    <!-- Define clip regions for three vertical thirds of the A -->
    <defs>
      <clipPath id="stage1"><rect x="0" y="0" width="20" height="60"/></clipPath>
      <clipPath id="stage2"><rect x="20" y="0" width="16" height="60"/></clipPath>
      <clipPath id="stage3"><rect x="36" y="0" width="24" height="60"/></clipPath>
    </defs>
    <!-- Stage 1 (left third): rough pencil sketch -->
    <g clip-path="url(#stage1)">
      <path d="M28 0 Q28 0 8 52" stroke="currentColor" stroke-width="1.75" fill="none" opacity="0.7" stroke-linecap="round"/>
      <path d="M28 0 Q28 2 46 52" stroke="currentColor" stroke-width="1.75" fill="none" opacity="0.7" stroke-linecap="round"/>
      <path d="M16 33 Q26 32 38 33" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
    </g>
    <!-- Stage 2 (middle third): dashed blueprint -->
    <g clip-path="url(#stage2)">
      <line x1="28" y1="0" x2="8" y2="52" stroke="#0891b2" stroke-width="1.75" stroke-dasharray="3 2"/>
      <line x1="28" y1="0" x2="48" y2="52" stroke="#0891b2" stroke-width="1.75" stroke-dasharray="3 2"/>
      <line x1="16" y1="33" x2="40" y2="33" stroke="#0891b2" stroke-width="2"/>
    </g>
    <!-- Stage 3 (right third): solid built -->
    <g clip-path="url(#stage3)">
      <path d="M28 0 L48 52 L8 52 Z" fill="#0891b2"/>
      <rect x="16" y="33" width="24" height="3" fill="var(--bg, #0c1929)"/>
    </g>
    <!-- Small divider ticks between stages -->
    <g stroke="#0891b2" stroke-width="0.5" opacity="0.4">
      <line x1="20" y1="54" x2="20" y2="58"/>
      <line x1="36" y1="54" x2="36" y2="58"/>
    </g>
    <!-- Stage labels -->
    <g font-family="ui-monospace, monospace" font-size="5" letter-spacing="1" fill="#0891b2" opacity="0.7" text-anchor="middle">
      <text x="10" y="64">SKETCH</text>
      <text x="28" y="64">PLAN</text>
      <text x="48" y="64">BUILT</text>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="80" y="36" font-family="system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
  <text x="80" y="52" font-family="ui-monospace, monospace" font-size="8" letter-spacing="3" fill="#0891b2" opacity="0.7">IDEA → BLUEPRINT → BUILT</text>
</svg>
