<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- Wireframe isometric A — all edges visible, engineering-drawing feel -->
  <g transform="translate(4 8)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Top face outline -->
    <path d="M32 4 L56 16 L32 28 L8 16 Z"/>
    <!-- Bottom face outline (visible through wireframe) -->
    <path d="M32 36 L56 48 L32 60 L8 48 Z"/>
    <!-- Vertical edges connecting top to bottom -->
    <line x1="32" y1="4" x2="32" y2="36"/>
    <line x1="8" y1="16" x2="8" y2="48"/>
    <line x1="56" y1="16" x2="56" y2="48"/>
    <line x1="32" y1="28" x2="32" y2="60"/>
  </g>
  <!-- A-shaped cutout on top face, highlighted in accent -->
  <g transform="translate(4 8)" stroke="#0891b2" stroke-width="1.5" fill="none">
    <path d="M32 10 L44 17 L20 17 Z"/>
    <line x1="26" y1="14" x2="38" y2="14"/>
  </g>
  <!-- Vanishing-point tick -->
  <g stroke="#0891b2" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.4">
    <line x1="4" y1="64" x2="68" y2="64"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="46" font-family="system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
</svg>
