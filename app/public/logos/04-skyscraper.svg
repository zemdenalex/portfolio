<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Skyscraper A: tall tapering tower with window stripes -->
  <g transform="translate(12 6)">
    <!-- Spire/antenna -->
    <line x1="20" y1="0" x2="20" y2="6" stroke="#0891b2" stroke-width="1.5"/>
    <!-- Main tower silhouette (A-tapered) -->
    <path d="M20 6 L36 66 L4 66 Z" fill="currentColor"/>
    <!-- Stepped window rows (horizontal stripes) -->
    <g fill="#0891b2" opacity="0.9">
      <rect x="14" y="14" width="12" height="1.5"/>
      <rect x="13" y="20" width="14" height="1.5"/>
      <rect x="12" y="26" width="16" height="1.5"/>
      <rect x="10" y="32" width="20" height="1.5"/>
      <rect x="9" y="38" width="22" height="1.5"/>
      <rect x="8" y="44" width="24" height="1.5"/>
      <rect x="7" y="50" width="26" height="1.5"/>
      <rect x="6" y="56" width="28" height="1.5"/>
      <rect x="5" y="62" width="30" height="1.5"/>
    </g>
    <!-- Entrance (small dark rectangle at base) -->
    <rect x="17" y="60" width="6" height="6" fill="#0891b2"/>
    <!-- Ground line -->
    <line x1="-2" y1="68" x2="42" y2="68" stroke="#0891b2" stroke-width="1"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="44" font-family="system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.6" fill="currentColor">Archifex</text>
  <text x="72" y="58" font-family="ui-monospace, monospace" font-size="7" letter-spacing="3.5" fill="#0891b2" opacity="0.7">BUILT TO SCALE</text>
</svg>
