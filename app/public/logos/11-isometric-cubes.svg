<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- A formed by stacked 3D isometric unit cubes -->
  <defs>
    <symbol id="cube" viewBox="0 0 24 28" overflow="visible">
      <!-- Top -->
      <path d="M12 0 L24 6 L12 12 L0 6 Z" fill="#0891b2"/>
      <!-- Left face -->
      <path d="M0 6 L12 12 L12 26 L0 20 Z" fill="#0891b2" opacity="0.55"/>
      <!-- Right face -->
      <path d="M24 6 L12 12 L12 26 L24 20 Z" fill="#0891b2" opacity="0.3"/>
    </symbol>
  </defs>
  <g transform="translate(4 4)">
    <!-- Stack order matters: back-to-front, bottom-to-top -->
    <!-- Base row -->
    <use href="#cube" x="0" y="42"/>
    <use href="#cube" x="48" y="42"/>
    <!-- Gap row -->
    <use href="#cube" x="6" y="32"/>
    <use href="#cube" x="42" y="32"/>
    <!-- Crossbar row (full) -->
    <use href="#cube" x="12" y="22"/>
    <use href="#cube" x="24" y="22"/>
    <use href="#cube" x="36" y="22"/>
    <!-- Upper legs -->
    <use href="#cube" x="18" y="12"/>
    <use href="#cube" x="30" y="12"/>
    <!-- Apex -->
    <use href="#cube" x="24" y="2"/>
  </g>
  <!-- Wordmark -->
  <text x="98" y="50" font-family="system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.8" fill="currentColor">Archifex</text>
</svg>
