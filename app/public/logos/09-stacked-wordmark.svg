<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" fill="none">
  <!-- Serious stacked wordmark: ARCHI over FEX with divider -->
  <text x="110" y="32" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="6" fill="currentColor">ARCHI</text>
  <!-- Divider with tick marks -->
  <g stroke="#0891b2" stroke-width="1.25">
    <line x1="40" y1="42" x2="180" y2="42"/>
    <line x1="40" y1="38" x2="40" y2="46"/>
    <line x1="180" y1="38" x2="180" y2="46"/>
    <circle cx="110" cy="42" r="2" fill="#0891b2" stroke="none"/>
  </g>
  <text x="110" y="66" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="10" fill="currentColor">FEX</text>
  <!-- Tagline -->
  <text x="110" y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" letter-spacing="3" fill="#0891b2" opacity="0.7">EST. MMXXVI</text>
</svg>
