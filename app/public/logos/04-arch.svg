<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Literal arch above wordmark -->
  <g stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Arch (top half of circle with pillars) -->
    <path d="M40 48 L40 20 A36 36 0 0 1 112 20 L112 48"/>
    <!-- Keystone tick -->
    <line x1="76" y1="6" x2="76" y2="14"/>
    <!-- Floor line -->
    <line x1="28" y1="52" x2="124" y2="52" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="136" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="2" fill="currentColor">ARCHIFEX</text>
  <text x="136" y="58" font-family="ui-monospace, monospace" font-size="8" letter-spacing="4" fill="#0891b2" opacity="0.7">STUDIO</text>
</svg>
