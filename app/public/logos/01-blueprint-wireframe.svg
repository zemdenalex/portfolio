<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- Monogram A drawn as blueprint with dashed stroke + tick marks -->
  <g stroke="#0891b2" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left leg -->
    <line x1="10" y1="54" x2="28" y2="12" stroke-dasharray="4 2"/>
    <!-- Right leg -->
    <line x1="28" y1="12" x2="46" y2="54" stroke-dasharray="4 2"/>
    <!-- Crossbar -->
    <line x1="18" y1="36" x2="38" y2="36"/>
    <!-- Apex dot -->
    <circle cx="28" cy="12" r="2" fill="#0891b2"/>
    <!-- Measurement ticks on right -->
    <line x1="50" y1="12" x2="54" y2="12"/>
    <line x1="50" y1="54" x2="54" y2="54"/>
    <line x1="52" y1="12" x2="52" y2="54" stroke-width="0.75" stroke-dasharray="2 2"/>
  </g>
  <!-- Wordmark -->
  <text x="68" y="40" font-family="ui-monospace, Menlo, monospace" font-size="22" font-weight="700" letter-spacing="1" fill="currentColor">ARCHIFEX</text>
  <!-- Caption -->
  <text x="68" y="54" font-family="ui-monospace, Menlo, monospace" font-size="8" letter-spacing="3" fill="#0891b2" opacity="0.7">WEB ARCHITECTURE STUDIO</text>
</svg>
