<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- Drafting compass — legs form A clearly -->
  <g transform="translate(4 4)">
    <!-- Legs (thicker for obvious A-shape) -->
    <g stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="10" y1="52" x2="26" y2="4"/>
      <line x1="26" y1="4" x2="42" y2="52"/>
    </g>
    <!-- Crossbar (drawing arc — explicit A crossbar) -->
    <line x1="18" y1="32" x2="34" y2="32" stroke="#0891b2" stroke-width="3" stroke-linecap="round"/>
    <!-- Pivot pin at apex (accent circle) -->
    <circle cx="26" cy="4" r="4" fill="#0891b2"/>
    <circle cx="26" cy="4" r="1.5" fill="var(--bg, #0c1929)"/>
    <!-- Radius arc (what the compass is drawing) -->
    <path d="M10 52 Q26 42 42 52" stroke="#0891b2" stroke-width="1" stroke-dasharray="3 2" fill="none" opacity="0.7"/>
    <!-- Needle & pencil tips -->
    <path d="M8 52 L10 52 L12 56 Z" fill="currentColor"/>
    <path d="M40 52 L42 52 L44 56 Z" fill="currentColor"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="42" font-family="system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
</svg>
