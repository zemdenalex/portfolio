<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Clean isometric A-solid (triangular prism viewed from 3/4) -->
  <g transform="translate(2 6)">
    <!-- Back-right face -->
    <path d="M32 6 L56 20 L56 56 L32 42 Z" fill="#0891b2" opacity="0.35"/>
    <!-- Back-left face -->
    <path d="M32 6 L8 20 L8 56 L32 42 Z" fill="#0891b2" opacity="0.55"/>
    <!-- Top face (brightest) -->
    <path d="M32 6 L56 20 L32 34 L8 20 Z" fill="#0891b2"/>
    <!-- Crossbar cut on top face (where A's crossbar would be) -->
    <path d="M20 13 L44 13 L40 15 L24 15 Z" fill="var(--bg, #0c1929)" opacity="0.9"/>
    <!-- Edge highlights -->
    <g stroke="#0891b2" stroke-width="0.75" fill="none" opacity="0.9">
      <path d="M32 6 L32 42"/>
      <path d="M8 20 L32 34 L56 20"/>
      <path d="M8 56 L32 42 L56 56"/>
    </g>
    <!-- Baseline tick -->
    <g stroke="#0891b2" stroke-width="0.75" opacity="0.5">
      <line x1="8" y1="60" x2="56" y2="60" stroke-dasharray="2 2"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="80" y="46" font-family="system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.8" fill="currentColor">Archifex</text>
</svg>
