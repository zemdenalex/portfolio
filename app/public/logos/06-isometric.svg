<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 72" fill="none">
  <!-- Isometric 3D A-block (three visible faces) -->
  <g>
    <!-- Top face (light) -->
    <path d="M30 4 L54 18 L30 32 L6 18 Z" fill="#0891b2" opacity="0.9"/>
    <!-- Left face (mid) -->
    <path d="M6 18 L30 32 L30 60 L6 46 Z" fill="#0891b2" opacity="0.55"/>
    <!-- Right face (dark) -->
    <path d="M54 18 L30 32 L30 60 L54 46 Z" fill="#0891b2" opacity="0.3"/>
    <!-- A-cutout: crossbar groove on top face -->
    <path d="M18 24 L42 24 L38 26 L22 26 Z" fill="var(--bg, #0c1929)" opacity="0.8"/>
    <!-- Edge highlights -->
    <g stroke="#0891b2" stroke-width="0.75" fill="none" opacity="0.6">
      <path d="M30 4 L30 32"/>
      <path d="M30 32 L30 60"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="72" y="42" font-family="system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="currentColor">Archifex</text>
</svg>
