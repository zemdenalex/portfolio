<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!-- A formed by crossed rebar/reinforcement grid -->
  <g transform="translate(6 4)">
    <!-- Diagonal rebars forming A silhouette -->
    <g stroke="#0891b2" stroke-width="2" stroke-linecap="square">
      <!-- Left leg bars -->
      <line x1="12" y1="60" x2="28" y2="4"/>
      <line x1="6" y1="60" x2="23" y2="4"/>
      <line x1="17" y1="60" x2="32" y2="4"/>
      <!-- Right leg bars -->
      <line x1="44" y1="60" x2="28" y2="4"/>
      <line x1="50" y1="60" x2="33" y2="4"/>
      <line x1="39" y1="60" x2="24" y2="4"/>
    </g>
    <!-- Horizontal ties (rebar rings) -->
    <g stroke="currentColor" stroke-width="1.5">
      <line x1="18" y1="20" x2="38" y2="20"/>
      <line x1="14" y1="34" x2="42" y2="34"/>
      <line x1="10" y1="48" x2="46" y2="48"/>
    </g>
    <!-- Tie wire wraps (small dots at intersections) -->
    <g fill="currentColor">
      <circle cx="28" cy="4" r="1.5"/>
      <circle cx="23" cy="20" r="1"/>
      <circle cx="33" cy="20" r="1"/>
      <circle cx="18" cy="34" r="1"/>
      <circle cx="38" cy="34" r="1"/>
      <circle cx="14" cy="48" r="1"/>
      <circle cx="42" cy="48" r="1"/>
    </g>
    <!-- Base (concrete pad) -->
    <rect x="-2" y="62" width="60" height="4" fill="currentColor" opacity="0.6"/>
    <rect x="-2" y="66" width="60" height="1" fill="#0891b2"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="42" font-family="system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
  <text x="80" y="56" font-family="ui-monospace, monospace" font-size="7" letter-spacing="3" fill="#0891b2" opacity="0.7">STRUCTURAL · FRAMEWORK</text>
</svg>
