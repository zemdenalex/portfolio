<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Continuous ribbon folding into A -->
  <g transform="translate(6 6)">
    <!-- Back/shadow ribbon piece -->
    <path d="M28 8 L54 60 L50 60 L26 12 Z" fill="#0891b2" opacity="0.4"/>
    <!-- Main ribbon stroke forming A -->
    <path d="M4 60 L28 4 L52 60 L42 60 L28 30 L14 60 Z" fill="#0891b2"/>
    <!-- Crossbar — the ribbon folds across -->
    <path d="M14 38 L42 38 L40 44 L16 44 Z" fill="currentColor"/>
    <!-- Highlight along top edge (ribbon fold line) -->
    <path d="M4 60 L28 4 L29 6 L6 60 Z" fill="#fff" opacity="0.2"/>
    <!-- Ribbon ends — V-notch endings at the base -->
    <path d="M4 60 L8 66 L12 60 Z" fill="#0891b2"/>
    <path d="M42 60 L46 66 L50 60 Z" fill="#0891b2"/>
    <!-- Small fold crease at apex -->
    <path d="M28 4 L30 8 L26 8 Z" fill="currentColor" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="78" y="42" font-family="system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.3" fill="currentColor">Archifex</text>
  <text x="78" y="56" font-family="ui-monospace, monospace" font-size="7" letter-spacing="3" fill="#0891b2" opacity="0.7">WOVEN · TOGETHER</text>
</svg>
