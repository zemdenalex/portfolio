<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Interactive Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c1929;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #0891b2;
    cursor: crosshair;
  }

  /* Grid dot pattern background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(8, 145, 178, 0.12) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    transition: transform 0.1s ease-out;
  }

  /* Fine grid lines */
  .grid-lines {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(8, 145, 178, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(8, 145, 178, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  .blueprint-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  svg.blueprint {
    width: 900px;
    height: 620px;
    max-width: 90vw;
    max-height: 85vh;
    overflow: visible;
  }

  /* Draw-in animation for all wireframe strokes */
  .wire {
    stroke: #0891b2;
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    animation: drawIn 2.5s ease-out forwards;
  }

  .wire-thin {
    stroke: rgba(8, 145, 178, 0.35);
    stroke-width: 0.75;
    fill: none;
    stroke-dasharray: 1500;
    stroke-dashoffset: 1500;
    animation: drawIn 3s ease-out forwards;
  }

  .wire-accent {
    stroke: rgba(8, 145, 178, 0.7);
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: drawIn 2s ease-out forwards;
  }

  /* Staggered delays for sequential drawing effect */
  .delay-1 { animation-delay: 0.2s; }
  .delay-2 { animation-delay: 0.5s; }
  .delay-3 { animation-delay: 0.8s; }
  .delay-4 { animation-delay: 1.1s; }
  .delay-5 { animation-delay: 1.4s; }
  .delay-6 { animation-delay: 1.7s; }
  .delay-7 { animation-delay: 2.0s; }
  .delay-8 { animation-delay: 2.3s; }
  .delay-9 { animation-delay: 2.6s; }
  .delay-10 { animation-delay: 2.9s; }

  @keyframes drawIn {
    to { stroke-dashoffset: 0; }
  }

  /* Dimension labels — hidden until hover */
  .dim-label {
    fill: rgba(8, 145, 178, 0);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: fill 0.4s ease;
    pointer-events: none;
  }

  .dim-line {
    stroke: rgba(8, 145, 178, 0);
    stroke-width: 0.5;
    stroke-dasharray: 4 2;
    transition: stroke 0.4s ease;
    pointer-events: none;
  }

  .dim-tick {
    stroke: rgba(8, 145, 178, 0);
    stroke-width: 1;
    transition: stroke 0.4s ease;
    pointer-events: none;
  }

  /* Section hover zones */
  .section-zone {
    fill: transparent;
    cursor: pointer;
    transition: fill 0.3s ease;
  }

  .section-zone:hover {
    fill: rgba(8, 145, 178, 0.04);
  }

  .section-zone:hover ~ .dim-label,
  .section-group:hover .dim-label {
    fill: rgba(8, 145, 178, 0.7);
  }

  .section-group:hover .dim-line {
    stroke: rgba(8, 145, 178, 0.4);
  }

  .section-group:hover .dim-tick {
    stroke: rgba(8, 145, 178, 0.5);
  }

  .section-group:hover .section-label {
    fill: rgba(8, 145, 178, 0.5);
  }

  /* Section name labels */
  .section-label {
    fill: rgba(8, 145, 178, 0);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: fill 0.4s ease;
    pointer-events: none;
  }

  /* Corner registration marks */
  .reg-mark {
    stroke: rgba(8, 145, 178, 0.2);
    stroke-width: 0.75;
    fill: none;
    opacity: 0;
    animation: fadeIn 1s ease-out 3s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Title block */
  .title-text {
    fill: rgba(8, 145, 178, 0.5);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 3.2s forwards;
  }

  .title-text-small {
    fill: rgba(8, 145, 178, 0.3);
    font-family: 'Courier New', monospace;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 3.5s forwards;
  }

  /* Crosshair cursor indicator */
  .crosshair {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    opacity: 0.15;
  }

  .crosshair-h, .crosshair-v {
    position: fixed;
    background: #0891b2;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.2s;
  }

  body:hover .crosshair-h,
  body:hover .crosshair-v {
    opacity: 0.06;
  }

  .crosshair-h {
    height: 1px;
    width: 100%;
    left: 0;
  }

  .crosshair-v {
    width: 1px;
    height: 100%;
    top: 0;
  }

  /* Coordinate readout */
  .coords {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(8, 145, 178, 0.25);
    font-size: 10px;
    letter-spacing: 1px;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    z-index: 100;
  }

  /* Pulse dot on hover sections */
  @keyframes pulse {
    0%, 100% { r: 2; opacity: 0.6; }
    50% { r: 4; opacity: 0.2; }
  }

  .pulse-dot {
    fill: #0891b2;
    animation: pulse 2s ease-in-out infinite;
    opacity: 0;
  }

  .section-group:hover .pulse-dot {
    opacity: 1;
  }

  /* Scan line effect */
  .scan-line {
    position: fixed;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(8, 145, 178, 0.06), transparent);
    z-index: 2;
    pointer-events: none;
    animation: scan 8s linear infinite;
  }

  @keyframes scan {
    0% { top: -2px; }
    100% { top: 100vh; }
  }
</style>
</head>
<body>

<div class="grid-bg" id="gridBg"></div>
<div class="grid-lines"></div>
<div class="scan-line"></div>

<div class="crosshair-h" id="crossH"></div>
<div class="crosshair-v" id="crossV"></div>

<div class="coords" id="coords">X: 0000 Y: 0000</div>

<div class="blueprint-container">
  <svg class="blueprint" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">

    <!-- Registration marks (corners) -->
    <g class="reg-mark">
      <line x1="10" y1="10" x2="30" y2="10"/>
      <line x1="10" y1="10" x2="10" y2="30"/>
    </g>
    <g class="reg-mark">
      <line x1="870" y1="10" x2="890" y2="10"/>
      <line x1="890" y1="10" x2="890" y2="30"/>
    </g>
    <g class="reg-mark">
      <line x1="10" y1="590" x2="30" y2="590"/>
      <line x1="10" y1="590" x2="10" y2="610"/>
    </g>
    <g class="reg-mark">
      <line x1="870" y1="590" x2="890" y2="590"/>
      <line x1="890" y1="590" x2="890" y2="610"/>
    </g>

    <!-- ========== OUTER FRAME ========== -->
    <rect x="50" y="40" width="800" height="500" class="wire delay-1" rx="2"/>

    <!-- ========== HEADER / NAV BAR ========== -->
    <g class="section-group">
      <rect x="50" y="40" width="800" height="56" class="section-zone"/>
      <rect x="50" y="40" width="800" height="56" class="wire delay-2" rx="2"/>

      <!-- Logo placeholder -->
      <rect x="70" y="52" width="90" height="32" class="wire-thin delay-3" rx="1"/>
      <line x1="80" y1="68" x2="140" y2="68" class="wire-thin delay-3"/>

      <!-- Nav items -->
      <line x1="540" y1="68" x2="580" y2="68" class="wire-accent delay-3"/>
      <line x1="600" y1="68" x2="650" y2="68" class="wire-accent delay-3"/>
      <line x1="670" y1="68" x2="720" y2="68" class="wire-accent delay-3"/>
      <rect x="750" y="56" width="80" height="28" class="wire-accent delay-3" rx="14"/>

      <!-- Dimension annotations -->
      <text x="450" y="35" class="dim-label" text-anchor="middle">HEADER: 800 x 56</text>
      <line x1="50" y1="30" x2="850" y2="30" class="dim-line"/>
      <line x1="50" y1="27" x2="50" y2="33" class="dim-tick"/>
      <line x1="850" y1="27" x2="850" y2="33" class="dim-tick"/>

      <text x="270" y="78" class="section-label">NAV</text>
      <circle cx="260" cy="75" class="pulse-dot" r="2"/>
    </g>

    <!-- ========== HERO SECTION ========== -->
    <g class="section-group">
      <rect x="50" y="96" width="800" height="180" class="section-zone"/>
      <rect x="50" y="96" width="800" height="180" class="wire delay-3" rx="2"/>

      <!-- Hero text lines -->
      <line x1="100" y1="140" x2="380" y2="140" class="wire-accent delay-4"/>
      <line x1="100" y1="160" x2="320" y2="160" class="wire-thin delay-4"/>
      <line x1="100" y1="180" x2="280" y2="180" class="wire-thin delay-4"/>

      <!-- CTA button -->
      <rect x="100" y="200" width="140" height="36" class="wire-accent delay-5" rx="4"/>
      <line x1="130" y1="218" x2="210" y2="218" class="wire-thin delay-5"/>

      <!-- Hero image placeholder -->
      <rect x="500" y="116" width="320" height="140" class="wire-thin delay-4" rx="2"/>
      <!-- Diagonal cross in image area -->
      <line x1="500" y1="116" x2="820" y2="256" class="wire-thin delay-5"/>
      <line x1="820" y1="116" x2="500" y2="256" class="wire-thin delay-5"/>

      <!-- Dimensions -->
      <text x="870" y="190" class="dim-label" text-anchor="start">HERO</text>
      <text x="870" y="202" class="dim-label" text-anchor="start">800 x 180</text>
      <line x1="855" y1="96" x2="855" y2="276" class="dim-line"/>
      <line x1="852" y1="96" x2="858" y2="96" class="dim-tick"/>
      <line x1="852" y1="276" x2="858" y2="276" class="dim-tick"/>

      <text x="350" y="240" class="section-label">HERO</text>
      <circle cx="340" cy="237" class="pulse-dot" r="2"/>
    </g>

    <!-- ========== CONTENT AREA: SIDEBAR + MAIN ========== -->

    <!-- Sidebar -->
    <g class="section-group">
      <rect x="50" y="286" width="200" height="204" class="section-zone"/>
      <rect x="50" y="286" width="200" height="204" class="wire delay-5" rx="2"/>

      <!-- Sidebar nav items -->
      <line x1="70" y1="310" x2="180" y2="310" class="wire-thin delay-6"/>
      <line x1="70" y1="332" x2="160" y2="332" class="wire-thin delay-6"/>
      <line x1="70" y1="354" x2="190" y2="354" class="wire-thin delay-6"/>
      <line x1="70" y1="376" x2="150" y2="376" class="wire-thin delay-6"/>
      <line x1="70" y1="398" x2="170" y2="398" class="wire-thin delay-6"/>

      <!-- Filter dots -->
      <circle cx="70" cy="426" r="6" class="wire-thin delay-7"/>
      <circle cx="90" cy="426" r="6" class="wire-thin delay-7"/>
      <circle cx="110" cy="426" r="6" class="wire-thin delay-7"/>
      <circle cx="130" cy="426" r="6" class="wire-thin delay-7"/>

      <!-- Dimensions -->
      <text x="150" y="502" class="dim-label" text-anchor="middle">SIDEBAR: 200px</text>
      <line x1="50" y1="496" x2="250" y2="496" class="dim-line"/>
      <line x1="50" y1="493" x2="50" y2="499" class="dim-tick"/>
      <line x1="250" y1="493" x2="250" y2="499" class="dim-tick"/>

      <text x="130" y="460" class="section-label">SIDEBAR</text>
      <circle cx="120" cy="457" class="pulse-dot" r="2"/>
    </g>

    <!-- Main content area -->
    <g class="section-group">
      <rect x="260" y="286" width="590" height="204" class="section-zone"/>
      <rect x="260" y="286" width="590" height="204" class="wire delay-5" rx="2"/>

      <!-- Content cards (3-column grid) -->
      <rect x="280" y="300" width="170" height="120" class="wire-thin delay-6" rx="2"/>
      <rect x="280" y="300" width="170" height="70" class="wire-thin delay-7" rx="2"/>
      <line x1="290" y1="390" x2="420" y2="390" class="wire-thin delay-7"/>
      <line x1="290" y1="404" x2="380" y2="404" class="wire-thin delay-7"/>

      <rect x="465" y="300" width="170" height="120" class="wire-thin delay-7" rx="2"/>
      <rect x="465" y="300" width="170" height="70" class="wire-thin delay-8" rx="2"/>
      <line x1="475" y1="390" x2="605" y2="390" class="wire-thin delay-8"/>
      <line x1="475" y1="404" x2="565" y2="404" class="wire-thin delay-8"/>

      <rect x="650" y="300" width="170" height="120" class="wire-thin delay-8" rx="2"/>
      <rect x="650" y="300" width="170" height="70" class="wire-thin delay-9" rx="2"/>
      <line x1="660" y1="390" x2="790" y2="390" class="wire-thin delay-9"/>
      <line x1="660" y1="404" x2="750" y2="404" class="wire-thin delay-9"/>

      <!-- "View more" link -->
      <line x1="400" y1="460" x2="500" y2="460" class="wire-accent delay-9"/>

      <!-- Dimensions -->
      <text x="555" y="502" class="dim-label" text-anchor="middle">CONTENT: 590 x 204</text>
      <line x1="260" y1="496" x2="850" y2="496" class="dim-line"/>
      <line x1="260" y1="493" x2="260" y2="499" class="dim-tick"/>
      <line x1="850" y1="493" x2="850" y2="499" class="dim-tick"/>

      <text x="550" y="460" class="section-label">CONTENT GRID</text>
      <circle cx="538" cy="457" class="pulse-dot" r="2"/>
    </g>

    <!-- ========== FOOTER ========== -->
    <g class="section-group">
      <rect x="50" y="490" width="800" height="50" class="section-zone"/>
      <rect x="50" y="490" width="800" height="50" class="wire delay-8" rx="2"/>

      <!-- Footer content -->
      <line x1="70" y1="518" x2="160" y2="518" class="wire-thin delay-9"/>
      <line x1="350" y1="518" x2="420" y2="518" class="wire-thin delay-9"/>
      <line x1="440" y1="518" x2="500" y2="518" class="wire-thin delay-9"/>
      <line x1="520" y1="518" x2="570" y2="518" class="wire-thin delay-9"/>
      <line x1="750" y1="518" x2="830" y2="518" class="wire-thin delay-9"/>

      <text x="450" y="556" class="dim-label" text-anchor="middle">FOOTER: 800 x 50</text>

      <text x="620" y="518" class="section-label">FOOTER</text>
      <circle cx="610" cy="515" class="pulse-dot" r="2"/>
    </g>

    <!-- ========== OVERALL DIMENSION: full width ========== -->
    <g class="section-group" style="pointer-events: none;">
      <text x="450" y="575" class="dim-label" text-anchor="middle" style="fill: rgba(8,145,178,0.25);">VIEWPORT: 1440 x 900</text>
    </g>

    <!-- ========== TITLE BLOCK (bottom-right, like architectural drawings) ========== -->
    <rect x="660" y="560" width="230" height="50" class="wire-thin delay-10" rx="1"/>
    <line x1="660" y1="575" x2="890" y2="575" class="wire-thin delay-10"/>
    <text x="775" y="572" class="title-text" text-anchor="middle">ARCHIFEX.SPACE</text>
    <text x="775" y="588" class="title-text-small" text-anchor="middle">WEBSITE BLUEPRINT</text>
    <text x="775" y="601" class="title-text-small" text-anchor="middle">SCALE: 1:1.6 &nbsp; REV: A</text>

  </svg>
</div>

<div style="position:fixed;bottom:16px;right:16px;color:rgba(180,190,220,0.3);font-size:11px;font-family:'Courier New',monospace;text-align:right;pointer-events:none;z-index:100;">
  CREATIVE & EXPERIMENTAL<br>archifex.space
</div>

<script>
// Parallax on grid background
const gridBg = document.getElementById('gridBg');
const crossH = document.getElementById('crossH');
const crossV = document.getElementById('crossV');
const coords = document.getElementById('coords');

let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

document.addEventListener('mousemove', (e) => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  targetX = (e.clientX - cx) / cx;
  targetY = (e.clientY - cy) / cy;

  // Update crosshair lines
  crossH.style.top = e.clientY + 'px';
  crossV.style.left = e.clientX + 'px';

  // Update coordinate readout
  coords.textContent = `X: ${String(e.clientX).padStart(4, '0')} Y: ${String(e.clientY).padStart(4, '0')}`;
});

function animateParallax() {
  // Smooth interpolation
  currentX += (targetX - currentX) * 0.05;
  currentY += (targetY - currentY) * 0.05;

  const moveX = currentX * 15;
  const moveY = currentY * 15;

  gridBg.style.transform = `translate(${moveX}px, ${moveY}px)`;

  requestAnimationFrame(animateParallax);
}

animateParallax();

// Add subtle glow pulse to section groups on hover
const sectionGroups = document.querySelectorAll('.section-group');
sectionGroups.forEach(group => {
  group.style.cursor = 'pointer';
});

// Animate dimension labels visibility on page load (show all briefly, then hide)
setTimeout(() => {
  const labels = document.querySelectorAll('.dim-label');
  labels.forEach(label => {
    label.style.fill = 'rgba(8, 145, 178, 0.5)';
  });
  const lines = document.querySelectorAll('.dim-line');
  lines.forEach(line => {
    line.style.stroke = 'rgba(8, 145, 178, 0.3)';
  });
  const ticks = document.querySelectorAll('.dim-tick');
  ticks.forEach(tick => {
    tick.style.stroke = 'rgba(8, 145, 178, 0.4)';
  });
  const sLabels = document.querySelectorAll('.section-label');
  sLabels.forEach(label => {
    label.style.fill = 'rgba(8, 145, 178, 0.35)';
  });

  // Fade them back out after showing
  setTimeout(() => {
    labels.forEach(label => {
      label.style.fill = '';
    });
    lines.forEach(line => {
      line.style.stroke = '';
    });
    ticks.forEach(tick => {
      tick.style.stroke = '';
    });
    sLabels.forEach(label => {
      label.style.fill = '';
    });
  }, 2500);
}, 3500);
</script>
</body>
</html>
