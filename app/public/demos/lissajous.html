<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lissajous Curves</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060c;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: rgba(255,255,255,0.4);
  }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.55;
    z-index: 10;
    text-align: center;
    line-height: 1.8;
  }
  #ratio {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    letter-spacing: 3px;
    opacity: 0.65;
    z-index: 10;
  }
  #desc {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.5;
    z-index: 10;
    text-align: center;
    max-width: 500px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ratio">1 : 1</div>
<div id="desc">two oscillations at right angles. when the frequencies are in simple ratios, closed curves appear. this is why musical intervals sound "consonant."</div>
<div id="info">
  ← →: change x frequency &middot; ↑ ↓: change y frequency &middot; click: randomize &middot; d: phase drift
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const ratioEl = document.getElementById('ratio');
const descEl = document.getElementById('desc');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let freqX = 1;
let freqY = 1;
let phase = 0;
let phaseDrift = 0.002;
let drifting = true;
let time = 0;

const descriptions = {
  '1:1': 'unison — the simplest relationship. an ellipse rotating through phase.',
  '1:2': 'octave — one oscillation fits exactly twice in the other. a figure-eight.',
  '2:3': 'perfect fifth — the most consonant interval after the octave. three lobes.',
  '3:4': 'perfect fourth — four meets three. the curves just miss closing, then connect.',
  '1:3': 'octave + fifth — three loops, perfectly nested.',
  '3:5': 'major sixth — five and three interlock. the pattern is complex but closed.',
};

function updateLabel() {
  // Simplify ratio
  function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
  const g = gcd(Math.round(freqX * 10), Math.round(freqY * 10));
  const a = Math.round(freqX * 10) / g;
  const b = Math.round(freqY * 10) / g;
  const key = `${a}:${b}`;
  ratioEl.textContent = `${a} : ${b}`;
  descEl.textContent = descriptions[key] || `frequency ratio ${a}:${b}`;
}

updateLabel();

function draw() {
  ctx.fillStyle = 'rgba(6, 6, 12, 0.02)';
  ctx.fillRect(0, 0, W, H);

  time += 0.015;
  if (drifting) phase += phaseDrift;

  const cx = W / 2;
  const cy = H / 2;
  const ampX = Math.min(W, H) * 0.35;
  const ampY = Math.min(W, H) * 0.35;
  const points = 2000;

  // Draw the curve
  ctx.beginPath();
  for (let i = 0; i <= points; i++) {
    const t = (i / points) * Math.PI * 2 * Math.max(freqX, freqY) * 4;
    const x = cx + Math.sin(freqX * t + phase) * ampX;
    const y = cy + Math.cos(freqY * t) * ampY;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  const hue = (phase * 30) % 360;
  ctx.strokeStyle = `hsla(${hue}, 50%, 60%, 0.15)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Bright dot at current position
  const t = time * 2;
  const dotX = cx + Math.sin(freqX * t + phase) * ampX;
  const dotY = cy + Math.cos(freqY * t) * ampY;
  ctx.beginPath();
  ctx.arc(dotX, dotY, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
  ctx.fill();

  // Projection on axes
  ctx.beginPath();
  ctx.moveTo(dotX, cy + ampY + 20);
  ctx.lineTo(dotX, cy + ampY + 30);
  ctx.strokeStyle = 'rgba(120, 170, 255, 0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx - ampX - 20, dotY);
  ctx.lineTo(cx - ampX - 30, dotY);
  ctx.strokeStyle = 'rgba(255, 140, 100, 0.3)';
  ctx.stroke();

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') { freqX = Math.min(9, freqX + 1); updateLabel(); clear(); }
  if (e.key === 'ArrowLeft') { freqX = Math.max(1, freqX - 1); updateLabel(); clear(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); freqY = Math.min(9, freqY + 1); updateLabel(); clear(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); freqY = Math.max(1, freqY - 1); updateLabel(); clear(); }
  if (e.key === 'd') { drifting = !drifting; }
});

function clear() {
  ctx.fillStyle = '#06060c';
  ctx.fillRect(0, 0, W, H);
}

canvas.addEventListener('click', () => {
  freqX = Math.floor(Math.random() * 5) + 1;
  freqY = Math.floor(Math.random() * 5) + 1;
  phase = Math.random() * Math.PI * 2;
  updateLabel();
  clear();
});
</script>
</body>
</html>
