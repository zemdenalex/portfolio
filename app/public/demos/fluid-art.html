<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid — Interactive Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font: 12px/1.4 'SF Mono', 'Consolas', monospace;
    text-align: center;
    pointer-events: none;
    transition: opacity 3s;
  }
  #info.fade { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">drag to stir — scroll to change viscosity — click to drop ink — 1-6 for colors</div>
<div style="position:fixed;bottom:16px;right:16px;color:rgba(180,190,220,0.3);font-size:11px;font-family:'Courier New',monospace;text-align:right;pointer-events:none;z-index:100;">
  CREATIVE & EXPERIMENTAL<br>archifex.space
</div>
<script>
// Jos Stam's stable fluid solver, adapted for the GPU of the mind.
// This is what I was trying to make for FlowTech — except there,
// it had to be subtle. Here, it can be itself.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

// Fade info after 5s
setTimeout(() => info.classList.add('fade'), 5000);

let W, H, N, size;
let u, v, u0, v0; // velocity
let d, d0;         // density
let dt = 0.1;
let diff = 0.0001;  // diffusion
let visc = 0.0000;  // viscosity
let mouseX = 0, mouseY = 0, pmouseX = 0, pmouseY = 0;
let mouseDown = false;

// Color palettes
const palettes = [
  [[60, 180, 255], [255, 100, 180]],   // 1: ocean-pink
  [[120, 255, 120], [40, 100, 255]],    // 2: green-blue
  [[255, 160, 40], [255, 40, 80]],      // 3: fire
  [[200, 140, 255], [80, 200, 255]],    // 4: lavender-cyan
  [[255, 255, 255], [255, 255, 255]],   // 5: smoke
  [[255, 80, 80], [80, 80, 255]],       // 6: red-blue
];
let palette = 0;

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  N = Math.min(200, Math.floor(Math.min(W, H) / 4));
  size = (N + 2) * (N + 2);
  u = new Float32Array(size);
  v = new Float32Array(size);
  u0 = new Float32Array(size);
  v0 = new Float32Array(size);
  d = new Float32Array(size);
  d0 = new Float32Array(size);
}

function IX(i, j) { return i + (N + 2) * j; }

function addSource(x, s, dt) {
  for (let i = 0; i < size; i++) x[i] += dt * s[i];
}

function setBnd(b, x) {
  for (let i = 1; i <= N; i++) {
    x[IX(0, i)]     = b === 1 ? -x[IX(1, i)] : x[IX(1, i)];
    x[IX(N + 1, i)] = b === 1 ? -x[IX(N, i)] : x[IX(N, i)];
    x[IX(i, 0)]     = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
    x[IX(i, N + 1)] = b === 2 ? -x[IX(i, N)] : x[IX(i, N)];
  }
  x[IX(0, 0)]         = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
  x[IX(0, N + 1)]     = 0.5 * (x[IX(1, N + 1)] + x[IX(0, N)]);
  x[IX(N + 1, 0)]     = 0.5 * (x[IX(N, 0)] + x[IX(N + 1, 1)]);
  x[IX(N + 1, N + 1)] = 0.5 * (x[IX(N, N + 1)] + x[IX(N + 1, N)]);
}

function diffuse(b, x, x0, diff, dt) {
  const a = dt * diff * N * N;
  for (let k = 0; k < 20; k++) {
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        x[IX(i, j)] = (x0[IX(i, j)] + a * (
          x[IX(i - 1, j)] + x[IX(i + 1, j)] +
          x[IX(i, j - 1)] + x[IX(i, j + 1)]
        )) / (1 + 4 * a);
      }
    }
    setBnd(b, x);
  }
}

function advect(b, d, d0, u, v, dt) {
  const dt0 = dt * N;
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      let x = i - dt0 * u[IX(i, j)];
      let y = j - dt0 * v[IX(i, j)];
      if (x < 0.5) x = 0.5;
      if (x > N + 0.5) x = N + 0.5;
      const i0 = Math.floor(x), i1 = i0 + 1;
      if (y < 0.5) y = 0.5;
      if (y > N + 0.5) y = N + 0.5;
      const j0 = Math.floor(y), j1 = j0 + 1;
      const s1 = x - i0, s0 = 1 - s1;
      const t1 = y - j0, t0 = 1 - t1;
      d[IX(i, j)] =
        s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
        s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
    }
  }
  setBnd(b, d);
}

function project(u, v, p, div) {
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      div[IX(i, j)] = -0.5 * (
        u[IX(i + 1, j)] - u[IX(i - 1, j)] +
        v[IX(i, j + 1)] - v[IX(i, j - 1)]
      ) / N;
      p[IX(i, j)] = 0;
    }
  }
  setBnd(0, div);
  setBnd(0, p);
  for (let k = 0; k < 20; k++) {
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        p[IX(i, j)] = (div[IX(i, j)] +
          p[IX(i - 1, j)] + p[IX(i + 1, j)] +
          p[IX(i, j - 1)] + p[IX(i, j + 1)]
        ) / 4;
      }
    }
    setBnd(0, p);
  }
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      u[IX(i, j)] -= 0.5 * N * (p[IX(i + 1, j)] - p[IX(i - 1, j)]);
      v[IX(i, j)] -= 0.5 * N * (p[IX(i, j + 1)] - p[IX(i, j - 1)]);
    }
  }
  setBnd(1, u);
  setBnd(2, v);
}

function velStep(u, v, u0, v0, visc, dt) {
  addSource(u, u0, dt);
  addSource(v, v0, dt);
  [u0, u] = [u, u0]; diffuse(1, u, u0, visc, dt);
  [v0, v] = [v, v0]; diffuse(2, v, v0, visc, dt);
  project(u, v, u0, v0);
  [u0, u] = [u, u0];
  [v0, v] = [v, v0];
  advect(1, u, u0, u0, v0, dt);
  advect(2, v, v0, u0, v0, dt);
  project(u, v, u0, v0);
}

function densStep(d, d0, u, v, diff, dt) {
  addSource(d, d0, dt);
  [d0, d] = [d, d0]; diffuse(0, d, d0, diff, dt);
  [d0, d] = [d, d0]; advect(0, d, d0, u, v, dt);
}

// We store RGB in 3 separate density fields for color mixing
let dr, dg, db, dr0, dg0, db0;

function initColor() {
  dr = new Float32Array(size); dg = new Float32Array(size); db = new Float32Array(size);
  dr0 = new Float32Array(size); dg0 = new Float32Array(size); db0 = new Float32Array(size);
}

function getInputs() {
  u0.fill(0); v0.fill(0);
  dr0.fill(0); dg0.fill(0); db0.fill(0);

  if (!mouseDown) return;

  const i = Math.floor((mouseX / W) * N) + 1;
  const j = Math.floor((mouseY / H) * N) + 1;
  if (i < 1 || i > N || j < 1 || j > N) return;

  const dx = mouseX - pmouseX;
  const dy = mouseY - pmouseY;

  // Add velocity
  const force = 5;
  u0[IX(i, j)] = force * dx;
  v0[IX(i, j)] = force * dy;

  // Add density (ink)
  const pal = palettes[palette];
  const t = (Math.sin(Date.now() * 0.001) + 1) / 2;
  const r = pal[0][0] * (1 - t) + pal[1][0] * t;
  const g = pal[0][1] * (1 - t) + pal[1][1] * t;
  const b = pal[0][2] * (1 - t) + pal[1][2] * t;

  const radius = 2;
  for (let di = -radius; di <= radius; di++) {
    for (let dj = -radius; dj <= radius; dj++) {
      const ni = i + di, nj = j + dj;
      if (ni >= 1 && ni <= N && nj >= 1 && nj <= N) {
        const dist = Math.sqrt(di * di + dj * dj);
        if (dist <= radius) {
          const strength = 150 * (1 - dist / radius);
          dr0[IX(ni, nj)] = strength * (r / 255);
          dg0[IX(ni, nj)] = strength * (g / 255);
          db0[IX(ni, nj)] = strength * (b / 255);
        }
      }
    }
  }
}

function render() {
  const img = ctx.createImageData(W, H);
  const data = img.data;
  const cellW = W / N;
  const cellH = H / N;

  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      const r = Math.min(255, dr[IX(i, j)] * 255);
      const g = Math.min(255, dg[IX(i, j)] * 255);
      const b = Math.min(255, db[IX(i, j)] * 255);

      const x0 = Math.floor((i - 1) * cellW);
      const y0 = Math.floor((j - 1) * cellH);
      const x1 = Math.floor(i * cellW);
      const y1 = Math.floor(j * cellH);

      for (let y = y0; y < y1 && y < H; y++) {
        for (let x = x0; x < x1 && x < W; x++) {
          const idx = (y * W + x) * 4;
          data[idx] = r;
          data[idx + 1] = g;
          data[idx + 2] = b;
          data[idx + 3] = 255;
        }
      }
    }
  }

  ctx.putImageData(img, 0, 0);
}

function step() {
  getInputs();
  velStep(u, v, u0, v0, visc, dt);
  densStep(dr, dr0, u, v, diff, dt);
  densStep(dg, dg0, u, v, diff, dt);
  densStep(db, db0, u, v, diff, dt);

  // Slow decay so ink fades
  for (let i = 0; i < size; i++) {
    dr[i] *= 0.995;
    dg[i] *= 0.995;
    db[i] *= 0.995;
  }

  render();
  pmouseX = mouseX;
  pmouseY = mouseY;
  requestAnimationFrame(step);
}

// Events
canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  pmouseX = mouseX = e.clientX;
  pmouseY = mouseY = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  const t = e.touches[0];
  pmouseX = mouseX = t.clientX;
  pmouseY = mouseY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX;
  mouseY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => mouseDown = false);

// Scroll to change viscosity
window.addEventListener('wheel', (e) => {
  visc += e.deltaY > 0 ? 0.00005 : -0.00005;
  visc = Math.max(0, Math.min(0.001, visc));
}, { passive: true });

// Number keys for palettes
window.addEventListener('keydown', (e) => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 6) palette = n - 1;
  if (e.key === 'c' || e.key === 'C') {
    dr.fill(0); dg.fill(0); db.fill(0);
    u.fill(0); v.fill(0);
  }
});

window.addEventListener('resize', init);

init();
initColor();
step();
</script>
</body>
</html>
